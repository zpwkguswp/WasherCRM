services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: whiteon_api_prod
    restart: always
    ports:
      - "80:8000"  # 외부 80포트를 컨테이너 8000포트로 연결
    env_file:
      - .env.production
    volumes:
      - ./backend/app/static:/app/app/static # 업로드 파일 영속성 유지
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

