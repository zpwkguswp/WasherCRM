server {
    listen 80;
    server_name _;

    # 사진 업로드 허용 용량 — 폰 사진 대응 (기본 1MB로는 부족)
    client_max_body_size 50M;

    # 앱별 라우트 — 정확 일치(우선순위 높음). /admin /manager /restaurant 가
    # 각자 다른 화면으로 가도록 매핑.
    location = /admin      { root /home/ubuntu/www; try_files /admin.html =404; }
    location = /hq         { root /home/ubuntu/www; try_files /admin.html =404; }
    location = /manager    { root /home/ubuntu/www; try_files /manager.html =404; }
    location = /restaurant { root /home/ubuntu/www; try_files /restaurant.html =404; }

    location / {
        root /home/ubuntu/www;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/v1 {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /static/ {
        alias /home/ubuntu/backend/app/static/;
    }
}
