<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhiteOn | 식당용</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <style>
        :root {
            --primary: #1e293b; --accent: #2563eb; --bg: #f8fafc; --card: #ffffff;
            --text: #0f172a; --text-light: #64748b; --border: #e2e8f0;
            --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Pretendard', sans-serif; background-color: #1e293b; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .mobile-container { width: 100%; max-width: 480px; height: 100vh; max-height: 900px; background: var(--bg); position: relative; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); display: flex; flex-direction: column; }
        @media (max-height: 900px) { .mobile-container { height: 100vh; max-height: none; border-radius: 0; } }
        @media (min-width: 481px) { .mobile-container { border-radius: 30px; border: 8px solid #334155; } }

        .header { background: #1e293b; padding: 15px 20px; color: white; position: sticky; top: 0; z-index: 10; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .header img { height: 25px; filter: brightness(0) invert(1); }
        .header .user-badge { font-size: 0.75rem; font-weight: 700; background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 20px; cursor: pointer; }

        .content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: white; border-radius: 16px; padding: 18px; margin-bottom: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border-left: 5px solid #e2e8f0; }
        h1, h2 { font-size: 1.3rem; font-weight: 800; margin: 0 0 15px 0; color: var(--primary); }
        .sub-text { color: var(--text-light); font-size: 0.85rem; margin-bottom: 20px; }

        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; font-size: 0.95rem; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: #e2e8f0; color: var(--text); }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: #fee2e2; color: var(--danger); font-size: 0.8rem; padding: 8px; border: 1px solid #fecaca; width: auto; display: inline-flex; }

        .nav-bar { position: absolute; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--border); z-index: 10; }
        .nav-item { color: #94a3b8; font-size: 1.3rem; cursor: pointer; text-align: center; flex: 1; }
        .nav-item.active { color: var(--accent); }
        .nav-item span { display: block; font-size: 0.65rem; margin-top: 4px; font-weight: 700; }

        .badge { padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; color: white; }
        .badge-pending { background: #ef4444; }
        .badge-progress { background: #f59e0b; }
        .badge-wait { background: #3b82f6; }
        .badge-completed { background: #10b981; }
        .badge-cancel { background: #94a3b8; }
        .badge-suspended { background: #6b7280; }

        .bill-box { background: #f8fafc; border: 1px dashed var(--border); border-radius: 12px; padding: 15px; margin-top: 10px; font-size: 0.85rem; }
        .bill-row { display: flex; justify-content: space-between; margin-bottom: 5px; }

        /* 별점 스타일 */
        .rating { display: flex; gap: 10px; font-size: 2rem; color: #e2e8f0; cursor: pointer; justify-content: center; margin: 20px 0; }
        .rating i.active { color: #f59e0b; }

        .modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 100; padding: 20px; align-items: center; justify-content: center; }
        .modal-content { background: white; border-radius: 24px; padding: 30px; width: 100%; text-align: center; }
    </style>
</head>
<body>

    <div class="mobile-container">
        <div class="header">
            <img src="/static/logo.png" alt="WhiteOn" onclick="app.showTab('home')" style="cursor:pointer;">
            <div id="header-user-badge" class="user-badge" style="display:none;" onclick="app.showPage('profile')"></div>
        </div>

        <div class="content">
            <div id="page-login" class="page active">
                <div style="text-align:center; margin:40px 0;"><i class="fas fa-store" style="font-size:3rem; color:var(--accent);"></i><h2 style="margin-top:15px;">사장님 서비스</h2></div>
                <div class="card" style="border:none; padding:0;">
                    <div style="margin-bottom:15px;"><label style="font-size:0.8rem; font-weight:600; color:var(--text-light);">휴대폰 번호</label><input type="tel" id="login-phone" placeholder="'-' 제외 입력" style="width:100%; padding:12px; border-radius:12px; border:1px solid var(--border);"></div>
                    <button class="btn btn-primary" onclick="app.login()">로그인</button>
                    <button class="btn btn-secondary" onclick="app.showPage('register')" style="margin-top:15px; background:none; text-decoration:underline; font-size:0.85rem;">신규 가입 신청하기</button>
                </div>
            </div>

            <div id="page-register" class="page">
                <h2>신규 가입 신청</h2>
                <div class="card" style="border:none; padding:0;">
                    <div style="margin-bottom:12px;"><label style="font-size:0.8rem; font-weight:600;">상호명</label><input type="text" id="reg-name" style="width:100%; padding:10px; border-radius:10px; border:1px solid var(--border);"></div>
                    <div style="margin-bottom:12px;"><label style="font-size:0.8rem; font-weight:600;">연락처</label><input type="tel" id="reg-phone" style="width:100%; padding:10px; border-radius:10px; border:1px solid var(--border);"></div>
                    <div style="margin-bottom:12px; position:relative;"><label style="font-size:0.8rem; font-weight:600;">주소</label><input type="text" id="reg-addr" readonly style="width:100%; padding:10px; border-radius:10px; border:1px solid var(--border);"><button style="position:absolute; right:5px; bottom:5px; padding:5px 10px; font-size:0.7rem; border-radius:6px; background:#f1f5f9; border:1px solid var(--border); cursor:pointer;" onclick="app.searchAddress('reg')">찾기</button></div>
                    <div style="margin-bottom:15px;"><label style="font-size:0.8rem; font-weight:600;">상세주소</label><input type="text" id="reg-addr-detail" style="width:100%; padding:10px; border-radius:10px; border:1px solid var(--border);"></div>
                    <button class="btn btn-primary" onclick="app.register()">신청 완료</button>
                </div>
            </div>

            <div id="page-profile" class="page">
                <h2>정보 수정</h2>
                <div class="card" style="border:none; padding:0;">
                    <div style="margin-bottom:12px;"><label style="font-size:0.8rem; font-weight:600;">상호명</label><input type="text" id="profile-name" style="width:100%; padding:10px; border-radius:10px; border:1px solid var(--border);"></div>
                    <div style="margin-bottom:12px;"><label style="font-size:0.8rem; font-weight:600;">연락처</label><input type="tel" id="profile-phone" style="width:100%; padding:10px; border-radius:10px; border:1px solid var(--border);"></div>
                    <div style="margin-bottom:12px; position:relative;"><label style="font-size:0.8rem; font-weight:600;">주소</label><input type="text" id="profile-addr" readonly style="width:100%; padding:10px; border-radius:10px; border:1px solid var(--border);"><button style="position:absolute; right:5px; bottom:5px; padding:5px 10px; font-size:0.7rem; border-radius:6px; background:#f1f5f9; border:1px solid var(--border); cursor:pointer;" onclick="app.searchAddress('profile')">찾기</button></div>
                    <div style="margin-bottom:15px;"><label style="font-size:0.8rem; font-weight:600;">상세주소</label><input type="text" id="profile-addr-detail" style="width:100%; padding:10px; border-radius:10px; border:1px solid var(--border);"></div>
                    <button class="btn btn-primary" onclick="app.saveProfile()">저장하기</button>
                    <button class="btn btn-secondary" style="margin-top:10px;" onclick="app.showTab('home')">취소</button>
                </div>
            </div>

            <div id="page-waiting" class="page"><div style="text-align:center; margin-top:80px;"><i class="fas fa-clock" style="font-size:4rem; color:var(--warning);"></i><h2>승인 대기 중</h2></div></div>

            <div id="page-home" class="page">
                <div style="margin-bottom:20px;"><h2>반갑습니다!</h2><p class="sub-text" id="home-res-msg"></p></div>
                <div class="card" style="background:var(--accent); color:white; border:none; padding:25px 20px; text-align:center; cursor:pointer;" onclick="app.showPage('request')">
                    <i class="fas fa-wrench" style="font-size:2.2rem; margin-bottom:10px;"></i>
                    <div style="font-weight:800; font-size:1.1rem;">수리 요청하기</div>
                </div>
                <h3 style="font-size:1rem; margin:25px 0 10px 0;">🔔 진행 중인 수리</h3>
                <div id="active-requests-mini"></div>
            </div>

            <div id="page-status" class="page">
                <h2>전체 진행 상태</h2>
                <div id="full-status-list"></div>
            </div>

            <div id="page-info" class="page">
                <h2>WhiteOn 정보</h2>
                <div class="card" style="font-size: 0.75rem; line-height: 1.5; color: var(--text-light); border-left-color: var(--accent); padding:15px;">
                    <b style="color: var(--primary); font-size: 0.9rem;">화이트온</b><br>
                    (482861) 경기도 양주시 은현면 도하리 449-1번지<br>
                    사업자번호: 336-06-01157 | 이메일: whiteon5046@naver.com
                </div>
                <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:15px;">
                    <a href="https://whiteon.kr/about" target="_blank" style="background:white; border:1px solid var(--border); border-radius:12px; padding:15px 5px; text-align:center; text-decoration:none; color:var(--text); font-size:0.7rem; font-weight:700;"><i class="fas fa-home" style="display:block; margin-bottom:5px; color:var(--accent); font-size:1.2rem;"></i>홈페이지</a>
                    <a href="https://whiteon.kr/store" target="_blank" style="background:white; border:1px solid var(--border); border-radius:12px; padding:15px 5px; text-align:center; text-decoration:none; color:var(--text); font-size:0.7rem; font-weight:700;"><i class="fas fa-shopping-bag" style="display:block; margin-bottom:5px; color:var(--accent); font-size:1.2rem;"></i>상품몰</a>
                    <a href="https://whiteon.kr/process" target="_blank" style="background:white; border:1px solid var(--border); border-radius:12px; padding:15px 5px; text-align:center; text-decoration:none; color:var(--text); font-size:0.7rem; font-weight:700;"><i class="fas fa-handshake" style="display:block; margin-bottom:5px; color:var(--accent); font-size:1.2rem;"></i>렌탈/구매</a>
                    <a href="https://whiteon.kr/qna" target="_blank" style="background:white; border:1px solid var(--border); border-radius:12px; padding:15px 5px; text-align:center; text-decoration:none; color:var(--text); font-size:0.7rem; font-weight:700;"><i class="fas fa-question-circle" style="display:block; margin-bottom:5px; color:var(--accent); font-size:1.2rem;"></i>문의하기</a>
                    <a href="https://blog.naver.com/whiteon5046" target="_blank" style="background:white; border:1px solid var(--border); border-radius:12px; padding:15px 5px; text-align:center; text-decoration:none; color:var(--text); font-size:0.7rem; font-weight:700;"><i class="fab fa-line" style="display:block; margin-bottom:5px; color:var(--accent); font-size:1.2rem;"></i>블로그</a>
                    <a href="tel:1600-9057" style="background:white; border:1px solid var(--border); border-radius:12px; padding:15px 5px; text-align:center; text-decoration:none; color:var(--text); font-size:0.7rem; font-weight:700;"><i class="fas fa-phone-alt" style="display:block; margin-bottom:5px; color:var(--accent); font-size:1.2rem;"></i>대표전화</a>
                </div>
                <button class="btn btn-secondary" style="margin-top:40px; background:none; text-decoration:underline; font-size:0.8rem;" onclick="app.logout()">로그아웃</button>
            </div>

            <div id="page-request" class="page">
                <h2>수리 요청</h2>
                <div class="card" style="border:none; padding:0;">
                    <div style="margin-bottom:15px;">
                        <label style="font-size:0.8rem; font-weight:600;">고장 유형 (식기세척기 전용)</label>
                        <select id="req-category" style="width:100%; padding:12px; border-radius:12px; border:1px solid var(--border); font-size:0.9rem;">
                            <option value="세척 불량">🍽️ 세척 불량 (그릇 이물질/얼룩)</option>
                            <option value="전원/작동 에러">⚡ 전원 및 작동 에러 (에러코드)</option>
                            <option value="누수/배수 장애">💧 누수 및 배수 장애 (물 고임)</option>
                            <option value="급수/히터 이상">🔥 급수 및 온도 이상 (물 안 뜨거움)</option>
                            <option value="소음/진동 이상">🔊 소음 및 진동 이상 (굉음/떨림)</option>
                            <option value="세제/린스 불량">🧪 세제 및 린스 공급 불량 (안 마름)</option>
                            <option value="부품 파손/노후">🛠️ 부품 파손 및 소모품 교체</option>
                            <option value="기타">❓ 기타 (직접 입력)</option>
                        </select>
                    </div>
                    <div style="margin-bottom:15px;"><label style="font-size:0.8rem; font-weight:600;">증상 (필수)</label><textarea id="req-desc" rows="4" style="width:100%; padding:12px; border-radius:12px; border:1px solid var(--border);"></textarea></div>
                    <div style="margin-bottom:15px;"><label style="font-size:0.8rem; font-weight:600;">사진/동영상 (필수)</label><input type="file" id="req-file" style="width:100%; padding:10px; border-radius:10px; border:1px solid var(--border);"></div>
                    <button class="btn btn-primary" onclick="app.submitRequest()">요청 보내기</button>
                </div>
            </div>
        </div>

        <!-- Survey Modal -->
        <div id="modal-survey" class="modal">
            <div class="modal-content">
                <h2 style="margin-top:0;">수리 만족도 조사</h2>
                <p class="sub-text">수리는 만족스러우셨나요?<br>별점을 남겨주세요!</p>
                <div class="rating" id="star-rating">
                    <i class="fas fa-star" data-v="1"></i><i class="fas fa-star" data-v="2"></i><i class="fas fa-star" data-v="3"></i><i class="fas fa-star" data-v="4"></i><i class="fas fa-star" data-v="5"></i>
                </div>
                <textarea id="survey-comment" placeholder="추가 의견이 있으시면 적어주세요." style="width:100%; padding:12px; border-radius:12px; border:1px solid var(--border); margin-bottom:20px;"></textarea>
                <button class="btn btn-primary" onclick="app.submitSurvey()">설문 완료 및 수리 종료</button>
            </div>
        </div>

        <nav id="owner-nav" class="nav-bar" style="display:none;">
            <div class="nav-item active" data-nav="home" onclick="app.showTab('home')"><i class="fas fa-home"></i><span>홈</span></div>
            <div class="nav-item" data-nav="status" onclick="app.showTab('status')"><i class="fas fa-list-ul"></i><span>진행</span></div>
            <div class="nav-item" data-nav="info" onclick="app.showTab('info')"><i class="fas fa-info-circle"></i><span>정보</span></div>
        </nav>
    </div>

    <!-- Detailed Report Modal -->
    <div id="modal-report" class="modal" style="z-index:1100;">
        <div class="modal-content" style="width:95%; max-width:500px;">
            <h2 id="report-title" style="margin-top:0; border-bottom:2px solid var(--bg); padding-bottom:15px; font-size:1.2rem;">📋 수리 상세 리포트</h2>
            <div id="report-body" style="max-height:60vh; overflow-y:auto;"></div>
            <div style="margin-top:20px;">
                <button class="btn btn-secondary" style="width:100%; padding:15px;" onclick="document.getElementById('modal-report').style.display='none'">닫기</button>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = "/api/v1";
        const app = {
            restaurant: null, currentRating: 0, currentRequestId: null,
            showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById('page-' + id).classList.add('active'); const isMain = ['home','status','info','request','profile'].includes(id); document.getElementById('owner-nav').style.display = isMain ? 'flex' : 'none'; document.getElementById('header-user-badge').style.display = isMain ? 'block' : 'none'; if(id==='profile') this.loadProfile(); if(isMain) this.loadRequests(); window.scrollTo(0,0); },
            showTab(id) { document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); const nav = document.querySelector(`.nav-item[data-nav="${id}"]`); if(nav) nav.classList.add('active'); this.showPage(id); },
            searchAddress(prefix) { new daum.Postcode({ oncomplete: (data) => { document.getElementById(prefix + '-addr').value = data.address; const parts = data.address.split(' ').filter(p=>p.length>0); this.tempRegion = parts.length >= 2 ? parts[1] : (parts[0] || ""); }}).open(); },
            
            async login() {
                const phone = document.getElementById('login-phone').value.replace(/[^0-9]/g, '');
                const list = await (await fetch(`${API_BASE}/restaurants/`)).json();
                const user = list.find(r => r.phone.replace(/[^0-9]/g, '') === phone);
                if(user) { if(!user.is_approved) return this.showPage('waiting'); this.restaurant = user; this.refreshUI(); this.showPage('home'); }
                else alert('등록된 정보가 없습니다.');
            },
            refreshUI() { document.getElementById('header-user-badge').innerText = this.restaurant.name + "님"; document.getElementById('home-res-msg').innerText = this.restaurant.name + " 사장님, 반갑습니다!"; },
            
            async register() {
                const name = document.getElementById('reg-name').value; const phone = document.getElementById('reg-phone').value; const addr = document.getElementById('reg-addr').value; const detail = document.getElementById('reg-addr-detail').value;
                if(!name || !phone || !addr) return alert('모든 정보를 입력해 주세요.');
                const res = await fetch(`${API_BASE}/restaurants/`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, phone, address: `${addr}  ${detail}`, region: this.tempRegion||"", is_approved: false }) });
                if(res.ok) { alert('신청 완료!'); this.showPage('waiting'); }
            },

            loadProfile() { document.getElementById('profile-name').value = this.restaurant.name; document.getElementById('profile-phone').value = this.restaurant.phone; const addr = this.restaurant.address.split('  '); document.getElementById('profile-addr').value = addr[0]; document.getElementById('profile-addr-detail').value = addr[1] || ""; },
            async saveProfile() {
                const payload = { name: document.getElementById('profile-name').value, phone: document.getElementById('profile-phone').value, address: document.getElementById('profile-addr').value + '  ' + document.getElementById('profile-addr-detail').value, region: this.tempRegion || this.restaurant.region };
                const res = await fetch(`${API_BASE}/restaurants/${this.restaurant.id}`, { method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
                if(res.ok) { alert('수정 완료!'); this.restaurant = { ...this.restaurant, ...payload }; this.refreshUI(); this.showTab('home'); }
            },

            async loadRequests() {
                const data = await (await fetch(`${API_BASE}/requests/?restaurant_id=${this.restaurant.id}`)).json();
                const statusMap = { 'PENDING':['접수대기','pending'], 'IN_PROGRESS':['수리중','progress'], 'SUSPENDED':['중단됨','suspended'], 'PAYMENT_REQUESTED':['결제대기','wait'], 'COMPLETED':['완료','completed'], 'CANCELED':['취소됨','cancel'] };
                
                const active = data.filter(r => r.status !== 'COMPLETED' && r.status !== 'CANCELED').reverse();
                document.getElementById('active-requests-mini').innerHTML = active.map(r => `<div class="home-mini-card"><div><div style="font-weight:800; font-size:0.9rem;">${r.category}</div><div style="font-size:0.75rem; color:var(--text-light);">${new Date(r.created_at).toLocaleDateString()}</div></div><span class="badge badge-${statusMap[r.status][1]}">${statusMap[r.status][0]}</span></div>`).join('') || '<p style="text-align:center; padding:30px; font-size:0.8rem; color:var(--text-light);">진행 중인 수리가 없습니다.</p>';

                document.getElementById('full-status-list').innerHTML = data.reverse().map(r => {
                    const s = statusMap[r.status];
                    const isPayReq = r.status === 'PAYMENT_REQUESTED';
                    const isCompleted = r.status === 'COMPLETED';
                    return `
                        <div class="card" ${isCompleted ? `onclick="app.viewReport('${r.id}')" style="cursor:pointer; border-left:4px solid var(--success);"` : `style="border-left-color:var(--border);"`}>
                            <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                                <div><b style="font-size:1rem;">${r.category}</b><div style="font-size:0.75rem; color:var(--text-light);">${new Date(r.created_at).toLocaleString()}</div></div>
                                <span class="badge badge-${s[1]}">${s[0]}</span>
                            </div>
                            ${isCompleted ? `<div style="font-size:0.85rem; font-weight:700; color:var(--accent); margin-top:10px;">상세 리포트 및 만족도 확인 ></div>` : ''}
                            ${isPayReq ? `
                                <div class="bill-box">
                                    <div style="font-weight:800; border-bottom:1px solid var(--border); padding-bottom:5px; margin-bottom:8px;">💳 수리 정산 내역</div>
                                    ${(r.metadata?.bill_items || []).map(item => `<div class="bill-row"><span>${item.name}</span><b>₩${item.amt.toLocaleString()}</b></div>`).join('')}
                                    <div class="bill-row" style="margin-top:10px; border-top:1px solid var(--border); padding-top:5px; font-size:1rem; color:var(--accent);"><span>최종 합계</span><b>₩${(r.metadata?.requested_amount || 0).toLocaleString()}</b></div>
                                </div>
                                <button class="btn btn-success" style="margin-top:15px;" onclick="app.startPayment('${r.id}')">결제하기</button>
                            ` : (isCompleted ? '' : `<div style="font-size:0.85rem; color:#475569; margin-top:10px;">${r.description}</div>`)}
                            ${r.branch_name && !isCompleted ? `<div style="background:#eff6ff; border-radius:12px; padding:12px; margin-top:10px; font-size:0.8rem; border-left:3px solid var(--accent);"><i class="fas fa-id-badge"></i> <b>담당: ${r.branch_name}</b><br><a href="tel:${r.branch_phone}" style="color:var(--accent); text-decoration:none; font-weight:700;">📞 ${r.branch_phone}</a></div>` : ''}
                            <div style="display:flex; gap:10px; margin-top:12px;">
                                ${r.status === 'PENDING' ? `<button class="btn btn-danger" onclick="app.cancelRequest('${r.id}')">요청 취소</button>` : ''}
                                ${r.status === 'IN_PROGRESS' ? `<button class="btn btn-secondary" onclick="app.updateStatus('${r.id}', 'SUSPENDED')">수리 일시 중단</button>` : ''}
                                ${r.status === 'SUSPENDED' ? `<button class="btn btn-primary" onclick="app.updateStatus('${r.id}', 'IN_PROGRESS')">수리 재개</button>` : ''}
                            </div>
                        </div>`;
                }).join('') || '<p style="text-align:center; padding:20px;">내역이 없습니다.</p>';
            },

            async startPayment(id) { this.currentRequestId = id; alert('결제가 정상 처리되었습니다.'); document.getElementById('modal-survey').style.display = 'flex'; },
            
            submitSurvey() {
                const comment = document.getElementById('survey-comment').value;
                if(this.currentRating === 0) return alert('만족도 별점을 선택해 주세요.');
                
                fetch(`${API_BASE}/requests/${this.currentRequestId}`, {
                    method: 'PATCH', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ status: 'COMPLETED', metadata: { survey: { rating: this.currentRating, comment } } })
                }).then(res => {
                    if(res.ok) { 
                        alert('수리가 완료되었습니다. 소중한 의견 감사합니다!'); 
                        document.getElementById('modal-survey').style.display = 'none';
                        this.currentRating = 0; // 초기화
                        document.getElementById('survey-comment').value = '';
                        this.showTab('home'); 
                    } else {
                        alert('저장 중 오류가 발생했습니다.');
                    }
                });
            },
            
            async submitRequest() {
                const cat = document.getElementById('req-category').value; const desc = document.getElementById('req-desc').value; const file = document.getElementById('req-file').files[0];
                if(!desc || !file) return alert('증상 설명과 사진을 등록해 주세요.');
                const res = await fetch(`${API_BASE}/requests/`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ restaurant_id: this.restaurant.id, category: cat, description: desc, status: 'PENDING' }) });
                if(res.ok) { const r = await res.json(); const fd = new FormData(); fd.append('file', file); await fetch(`${API_BASE}/requests/${r.id}/media`, { method: 'POST', body: fd }); alert('접수 완료!'); this.showTab('status'); }
            },
            async cancelRequest(id) { if(!confirm('취소하시겠습니까?')) return; const res = await fetch(`${API_BASE}/requests/${id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status: 'CANCELED' }) }); if(res.ok) this.loadRequests(); },
            async updateStatus(id, newStatus) { 
                const msg = newStatus === 'SUSPENDED' ? '수리를 일시 중단하시겠습니까?' : '수리를 다시 재개하시겠습니까?';
                if(!confirm(msg)) return;
                const res = await fetch(`${API_BASE}/requests/${id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status: newStatus }) });
                if(res.ok) this.loadRequests();
            },
            async viewReport(id) {
                const res = await fetch(`${API_BASE}/requests/${id}`);
                const r = await res.json();
                
                let m = r.metadata;
                if(typeof m === 'string') try { m = JSON.parse(m); } catch(e) { m = {}; }
                m = m || {};

                const s = m.survey || {};
                const bill = m.bill_items || [];
                
                document.getElementById('report-title').innerText = `📋 수리 상세 리포트 (#${id.split('-')[0].toUpperCase()})`;
                document.getElementById('report-body').innerHTML = `
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px;">
                        <div class="card" style="margin:0; border-left:4px solid var(--danger); padding:12px; background:#fff5f5; border-radius:12px;">
                            <h4 style="margin:0 0 8px 0; font-size:0.75rem; color:var(--danger);">⚠️ 접수 증상</h4>
                            <div style="font-size:0.75rem;">${r.description}</div>
                        </div>
                        <div class="card" style="margin:0; border-left:4px solid var(--success); padding:12px; background:#f6ffed; border-radius:12px;">
                            <h4 style="margin:0 0 8px 0; font-size:0.75rem; color:var(--success);">🛠️ 수리 결과</h4>
                            <div style="font-size:0.75rem;"><b>원인:</b> ${m.report?.cause || '-'}<br><b>해결:</b> ${m.report?.sol || '-'}</div>
                        </div>
                    </div>
                    <div class="card" style="margin-bottom:15px; padding:12px; border-radius:12px;">
                        <h4 style="margin:0 0 8px 0; font-size:0.75rem; border-bottom:1px solid var(--bg); padding-bottom:5px;">💳 결제 상세 (₩${(m.requested_amount || 0).toLocaleString()})</h4>
                        <div style="font-size:0.7rem;">
                            ${bill.map(i => `<div style="display:flex; justify-content:space-between; margin-bottom:2px;"><span>${i.name}</span><b>₩${i.amt.toLocaleString()}</b></div>`).join('') || '내역 없음'}
                        </div>
                    </div>
                    <div class="card" style="margin-bottom:15px; padding:12px; background:#fffdf5; border-radius:12px;">
                        <h4 style="margin:0 0 8px 0; font-size:0.75rem; color:#854d0e;">⭐ 나의 만족도</h4>
                        <div style="font-size:0.75rem;">
                            <b>별점:</b> <span style="color:var(--warning); font-size:1rem;">${s.rating ? '⭐'.repeat(s.rating) : '평가 전'}</span><br>
                            <b>의견:</b> ${s.comment || '의견 없음'}
                        </div>
                    </div>
                    <h4 style="font-size:0.8rem; margin-bottom:10px; color:var(--text-light);"><i class="fas fa-camera"></i> 수리 전/후 사진</h4>
                    <div style="display:flex; gap:8px; overflow-x:auto; padding-bottom:10px;">
                        ${(r.media || []).map((f, idx) => `
                            <div style="position:relative; min-width:100px;">
                                <img src="${f.file_url}" style="height:100px; width:100px; border-radius:12px; object-fit:cover; border:1px solid var(--border); cursor:pointer;" onclick="window.open(this.src)">
                                <div style="position:absolute; bottom:5px; left:5px; right:5px; background:rgba(0,0,0,0.6); color:white; font-size:0.6rem; text-align:center; border-radius:4px; padding:2px;">
                                    ${idx === 0 ? '📸 접수사진' : '🛠️ 완료사진'}
                                </div>
                            </div>
                        `).join('') || '<p style="font-size:0.75rem; color:#94a3b8;">등록된 사진이 없습니다.</p>'}
                    </div>
                `;
                document.getElementById('modal-report').style.display = 'flex';
            },
            logout() { this.restaurant = null; this.showPage('login'); }
        };

        // 별점 이벤트 바인딩
        document.querySelectorAll('#star-rating i').forEach(star => {
            star.onclick = () => {
                app.currentRating = parseInt(star.dataset.v);
                document.querySelectorAll('#star-rating i').forEach((s, i) => {
                    s.classList.toggle('active', i < app.currentRating);
                });
            };
        });
    </script>
</body>
</html>
