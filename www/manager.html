<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhiteOn | 매니저 플랫폼</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <style>
        :root {
            --primary: #1e293b; --accent: #2563eb; --bg: #f8fafc; --card: #ffffff;
            --text: #0f172a; --text-light: #64748b; --border: #e2e8f0;
            --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Pretendard', sans-serif; background-color: #1e293b; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .mobile-container { width: 100%; max-width: 480px; height: 100vh; max-height: 900px; background: var(--bg); position: relative; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); display: flex; flex-direction: column; }
        @media (max-height: 900px) { .mobile-container { height: 100vh; max-height: none; border-radius: 0; } }
        @media (min-width: 481px) { .mobile-container { border-radius: 30px; border: 8px solid #334155; } }
        
        .header { background: #1e293b; padding: 15px 20px; color: white; position: sticky; top: 0; z-index: 10; display: flex; justify-content: space-between; align-items: center; }
        .header img { height: 25px; filter: brightness(0) invert(1); }
        .header .user-badge { font-size: 0.75rem; font-weight: 700; background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 20px; }
        
        .content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .page { display: none; }
        .page.active { display: block; }
        
        .card { background: white; border-radius: 16px; padding: 18px; margin-bottom: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border-left: 5px solid #e2e8f0; }
        .new-alert { animation: pulse 2s infinite; border: 2px solid var(--accent); background: #eff6ff; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(37,99,235,0.4); } 70% { box-shadow: 0 0 0 10px rgba(37,99,235,0); } 100% { box-shadow: 0 0 0 0 rgba(37,99,235,0); } }
        
        .detail-view { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px solid #f1f5f9; font-size: 0.85rem; color: var(--text-light); line-height: 1.6; }
        .card.expanded .detail-view { display: block; }
        
        .input-group { margin-bottom: 15px; position: relative; }
        .input-group label { display: block; font-size: 0.8rem; color: var(--text-light); margin-bottom: 5px; font-weight: 600; }
        .input-group input, .input-group textarea, .input-group select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 12px; font-size: 0.9rem; outline: none; }
        
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; font-size: 0.95rem; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: #e2e8f0; color: var(--text); }
        .btn-inline { position: absolute; right: 8px; bottom: 6px; padding: 6px 12px; border-radius: 8px; font-size: 0.75rem; background: #f1f5f9; border: 1px solid var(--border); cursor: pointer; font-weight: 700; }

        .nav-bar { position: absolute; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--border); }
        .nav-item { color: #94a3b8; font-size: 1.3rem; cursor: pointer; text-align: center; flex: 1; }
        .nav-item.active { color: var(--accent); }
        .nav-item span { display: block; font-size: 0.65rem; margin-top: 4px; font-weight: 700; }
        
        .badge { padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; color: white; }
    </style>
</head>
<body>
    <div class="mobile-container">
        <div class="header">
            <img src="/static/logo.png" alt="WhiteOn">
            <div id="header-user-name" class="user-badge" style="display:none;"></div>
        </div>

        <div class="content">
            <!-- Login -->
            <div id="page-login" class="page active">
                <div style="text-align:center; margin:40px 0;"><i class="fas fa-user-shield" style="font-size:3rem; color:var(--accent);"></i><h2>매니저 로그인</h2></div>
                <div class="card" style="border:none;">
                    <div class="input-group"><label>전화번호</label><input type="text" id="login-phone" placeholder="'-' 제외 입력"><button class="btn-inline" onclick="app.sendOTP('login')">인증번호</button></div>
                    <div id="otp-group-login" class="input-group" style="display:none;"><label>인증번호</label><input type="text" id="login-otp" placeholder="숫자 6자리 입력"></div>
                    <button class="btn btn-primary" onclick="app.login()">로그인</button>
                    <button class="btn btn-secondary" onclick="app.showPage('register')" style="margin-top:10px; background:none; font-size:0.8rem; text-decoration:underline;">지사 가입 신청하기</button>
                </div>
            </div>

            <!-- Register -->
            <div id="page-register" class="page">
                <h2 style="margin-bottom:20px;">지사 가입 신청</h2>
                <div class="card" style="border:none;">
                    <div class="input-group"><label>지사명</label><input type="text" id="reg-name" placeholder="예: 화이트온 강남지사"></div>
                    <div class="input-group"><label>매니저 연락처</label><input type="text" id="reg-phone" placeholder="'-' 제외 입력"></div>
                    <div class="input-group"><label>지사 주소</label><input type="text" id="reg-addr" placeholder="주소 찾기 클릭" readonly><button class="btn-inline" onclick="app.searchAddress()">주소 찾기</button></div>
                    <div class="input-group"><label>상세 주소</label><input type="text" id="reg-addr-detail" placeholder="건물명, 호수 등"></div>
                    <input type="hidden" id="reg-region">
                    <button class="btn btn-primary" onclick="app.registerBranch()">신청 완료</button>
                    <button class="btn btn-secondary" onclick="app.showPage('login')" style="margin-top:10px; background:none;">이전으로</button>
                </div>
            </div>

            <div id="page-assigned" class="page">
                <h2 style="margin-bottom:20px;">지역 내 할당 대기</h2>
                <div id="assigned-list"></div>
            </div>

            <div id="page-progress" class="page">
                <h2 style="margin-bottom:20px;">수리 진행 중</h2>
                <div id="progress-list"></div>
            </div>

            <div id="page-history" class="page">
                <h2 style="margin-bottom:20px;">완료 및 취소 내역</h2>
                <div id="history-list"></div>
            </div>

            <div id="page-waiting" class="page"><div style="text-align:center; margin-top:80px;"><i class="fas fa-clock" style="font-size:4rem; color:var(--warning);"></i><h2>승인 대기 중</h2><p style="color:var(--text-light); font-size:0.9rem;">본사 승인 후 서비스 이용이 가능합니다.</p><button class="btn btn-secondary" onclick="app.logout()" style="margin-top:20px;">이전으로</button></div></div>
        </div>

        <div id="manager-nav" class="nav-bar" style="display:none;">
            <div class="nav-item active" onclick="app.switchTab('assigned')"><i class="fas fa-bell"></i><span>할당</span></div>
            <div class="nav-item" onclick="app.switchTab('progress')"><i class="fas fa-tools"></i><span>진행</span></div>
            <div class="nav-item" onclick="app.switchTab('history')"><i class="fas fa-history"></i><span>내역</span></div>
            <div class="nav-item" onclick="app.logout()"><i class="fas fa-sign-out-alt"></i><span>로그아웃</span></div>
        </div>
    </div>

    <script>
        const API_BASE = "/api/v1";
        const app = {
            branch: null, generatedOTP: "111111",
            showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById('page-' + id).classList.add('active'); const isMain = !['login','waiting','register'].includes(id); document.getElementById('manager-nav').style.display = isMain ? 'flex' : 'none'; document.getElementById('header-user-name').style.display = isMain ? 'block' : 'none'; },
            sendOTP(type) { alert(`인증번호가 발송되었습니다: [${this.generatedOTP}]`); document.getElementById(`otp-group-${type}`).style.display = 'block'; },
            
            searchAddress() {
                new daum.Postcode({
                    oncomplete: (data) => {
                        document.getElementById('reg-addr').value = data.address;
                        const parts = data.address.split(' ').filter(p => p.length > 0);
                        const autoRegion = parts.length >= 2 ? parts[1] : (parts[0] || "");
                        document.getElementById('reg-region').value = autoRegion;
                    }
                }).open();
            },

            async login() {
                const phoneInput = document.getElementById('login-phone').value;
                const phone = phoneInput.replace(/[^0-9]/g, '');
                const otp = document.getElementById('login-otp').value;
                if(!otp || otp !== this.generatedOTP) return alert('인증번호를 확인해 주세요.');
                
                try {
                    const res = await fetch(`${API_BASE}/branches/`); 
                    if(!res.ok) throw new Error();
                    const data = await res.json();
                    const found = data.find(b => (b.manager_phone || '').replace(/[^0-9]/g, '') === phone);
                    
                    if(found) { 
                        this.branch = found; 
                        document.getElementById('header-user-name').innerText = found.name + "님"; 
                        if(!found.is_approved) return this.showPage('waiting'); 
                        this.showPage('assigned'); this.loadData(); 
                    } else {
                        alert('등록된 매니저 정보가 없습니다. 지사 가입 신청을 먼저 진행해 주세요.');
                    }
                } catch(e) {
                    alert('등록된 정보가 없습니다. 가입 여부를 확인해 주세요.');
                }
            },

            async registerBranch() {
                const name = document.getElementById('reg-name').value;
                const phone = document.getElementById('reg-phone').value;
                const addr = document.getElementById('reg-addr').value;
                const detail = document.getElementById('reg-addr-detail').value;
                const region = document.getElementById('reg-region').value;
                if(!name || !phone || !addr) return alert('모든 정보를 입력해 주세요.');
                
                try {
                    const res = await fetch(`${API_BASE}/branches/`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, manager_phone: phone, address: `${addr}  ${detail}`, region_code: region, is_approved: false, tier: 'BRONZE', commission_rate: 10 })
                    });
                    if(res.ok) {
                        alert('가입 신청이 완료되었습니다! 본사 승인 후 이용 가능합니다.');
                        this.showPage('waiting');
                    } else {
                        const err = await res.json();
                        alert(err.detail || '가입 신청 중 오류가 발생했습니다.');
                    }
                } catch(e) { alert('서버와 통신할 수 없습니다.'); }
            },

            switchTab(id) { document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active')); const navs = document.querySelectorAll('.nav-item'); if(id==='assigned') navs[0].classList.add('active'); else if(id==='progress') navs[1].classList.add('active'); else if(id==='history') navs[2].classList.add('active'); this.showPage(id); this.loadData(); },
            getServiceRegion() { 
                if(!this.branch || !this.branch.address) return ""; 
                const parts = this.branch.address.split(' ').filter(p => p.length > 0);
                for (let part of parts) { if (part.endsWith('시') || part.endsWith('군') || part.endsWith('구')) return part.replace(/시|군|구/, ''); }
                return parts[1] ? parts[1].replace(/시|군|구/, '') : "";
            },
            async loadData() {
                const region = this.getServiceRegion();
                const res = await fetch(`${API_BASE}/requests/?assigned_branch_id=${this.branch.id}&unassigned_region=${encodeURIComponent(region)}`);
                const data = await res.json();
                
                const pending = data.filter(r => r.status === 'PENDING').reverse();
                document.getElementById('assigned-list').innerHTML = pending.map(r => `
                    <div class="card new-alert">
                        <div style="font-size:0.75rem; color:var(--text-light);">신규 #${r.id.split('-')[0].toUpperCase()}</div>
                        <div style="font-weight:800; font-size:1.1rem; color:var(--accent);">${r.restaurant_name}</div>
                        <div style="font-size:0.85rem; margin-top:5px;">${r.address || '-'}</div>
                        <div style="font-weight:700; margin-top:5px; color:var(--danger);">${r.category}</div>
                        <button class="btn btn-primary" style="margin-top:15px; padding:10px;" onclick="app.acceptRequest('${r.id}')">수리 수락하기</button>
                    </div>`).join('') || '<p style="text-align:center; padding:40px; color:var(--text-light);">새로운 요청이 없습니다.</p>';

                const progress = data.filter(r => ['IN_PROGRESS','PAYMENT_REQUESTED'].includes(r.status)).reverse();
                document.getElementById('progress-list').innerHTML = progress.map(r => `
                    <div class="card" style="border-left-color:var(--warning);" onclick="this.classList.toggle('expanded')">
                        <div style="display:flex; justify-content:space-between; align-items:center;"><b>${r.restaurant_name}</b><span class="badge" style="background:${r.status==='IN_PROGRESS'?'#f59e0b':'#10b981'}">${r.status==='IN_PROGRESS'?'수리중':'결제대기'}</span></div>
                        <div class="detail-view">
                            <div>주소: ${r.address}</div><div>설명: ${r.description || '-'}</div>
                            ${r.status==='IN_PROGRESS'?`<button class="btn btn-primary" style="margin-top:10px;" onclick="event.stopPropagation(); app.openReport('${r.id}','${r.restaurant_name}','${r.created_at}')">리포트 작성</button>`:''}
                        </div>
                    </div>`).join('') || '<p style="text-align:center; padding:40px;">진행 중인 작업 없음</p>';

                const history = data.filter(r => ['COMPLETED','CANCELED'].includes(r.status)).reverse();
                document.getElementById('history-list').innerHTML = history.map(r => `
                    <div class="card" style="border-left-color:${r.status==='COMPLETED'?'var(--success)':'#94a3b8'};">
                        <div style="display:flex; justify-content:space-between; align-items:center;"><b>${r.restaurant_name}</b><span class="badge" style="background:${r.status==='COMPLETED'?'#10b981':'#94a3b8'}">${r.status==='COMPLETED'?'완료':'고객취소'}</span></div>
                        <div style="font-size:0.8rem; color:var(--text-light); margin-top:5px;">${r.category} | ${new Date(r.created_at).toLocaleDateString()}</div>
                    </div>`).join('') || '<p style="text-align:center; padding:40px;">내역 없음</p>';
            },
            async acceptRequest(id) { if(!confirm('수락하시겠습니까?')) return; const res = await fetch(`${API_BASE}/requests/${id}`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status:'IN_PROGRESS', assigned_branch_id:this.branch.id}) }); if(res.ok) { alert('수락 완료!'); this.switchTab('progress'); } },
            logout() { this.branch = null; this.showPage('login'); }
        };
    </script>
</body>
</html>
